# ================================================================
# DEBONUEL — Streamlit Secrets Template
# ================================================================
# This file tells Streamlit how to connect to your Google Sheet.
# You will fill this in on the Streamlit website — NOT here.
#
# On Streamlit Cloud:
#   Go to your app → Settings → Secrets → paste the content below
#   (filled with your real values)
# ================================================================

[gcp_service_account]
type = "service_account"
project_id = "YOUR_PROJECT_ID"
private_key_id = "YOUR_PRIVATE_KEY_ID"
private_key = "YOUR_PRIVATE_KEY"
client_email = "YOUR_CLIENT_EMAIL"
client_id = "YOUR_CLIENT_ID"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "YOUR_CERT_URL"

sheet_name = "DEBONUEL Sales Data"
